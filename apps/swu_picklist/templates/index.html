<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SWU - Deck Picklist</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4">Star Wars Unlimited - Deck Picklist</h3>

            <form method="POST">
                <div class="mb-3">
                    <label for="input_swudb_json" class="form-label">SWUDB Deck (JSON)</label>
                    <textarea class="form-control" id="input_swudb_json" name="input_swudb_json" rows="10"
                        placeholder="Export JSON and copy here"></textarea>
                </div>
                <div class="mb-3">
                    <label for="input_swudb_url" class="form-label">SWUDB Deck (URL)</label>
                    <input type="text" class="form-control" id="input_swudb_url" name="input_swudb_url"
                        placeholder="Ensure deck is Unlisted or Published!">
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="toggle_header" name="toggle_header" unchecked>
                    <label class="form-check-label" for="toggle_header">Use Header?</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="toggle_quantity_wide_checkboxes"
                        name="toggle_quantity_wide_checkboxes" unchecked>
                    <label class="form-check-label" for="toggle_quantity_wide_checkboxes">Use quantity-wide
                        checkboxes?</label>
                </div>

                <br />
                <button type="submit" class="btn btn-primary w-100">
                    Submit
                </button>
            </form>

            {% if converted_text %}
            <div class="mt-4">
                <label for="output_picklist" class="form-label">Deck Picklist</label>
                <textarea class="form-control" rows="100" readonly id="output_picklist" style="font-family:monospace;"
                    name="output_picklist">{{ converted_text }}</textarea>
            </div>
            {% endif %}
</body>

</html>
